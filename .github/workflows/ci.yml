name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: White-box unit suite
        run: pytest tests/ -v

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Black-box acceptance driven entirely by verify/manifest.env
      # (UP / READY / ACCEPTANCE / DOWN) — the same file the host e2e-verify loop
      # uses, so CI and the local loop never drift.
      - name: Bring up stack + run black-box acceptance
        run: |
          set -euo pipefail
          source verify/manifest.env

          echo "::group::compose up"
          eval "$UP"
          echo "::endgroup::"

          echo "Waiting for readiness (up to 2 min)…"
          for _ in $(seq 1 60); do
            if eval "$READY" >/dev/null 2>&1; then echo "app is ready"; break; fi
            sleep 2
          done
          eval "$READY"

          python -m venv verify/.venv
          verify/.venv/bin/pip install --quiet --upgrade pip
          verify/.venv/bin/pip install --quiet $TEST_DEPS
          eval "$ACCEPTANCE"

      - name: Stack logs (on failure)
        if: failure()
        run: |
          source verify/manifest.env
          eval "$LOGS" || true

      - name: Teardown
        if: always()
        run: |
          source verify/manifest.env
          eval "$DOWN" || true
